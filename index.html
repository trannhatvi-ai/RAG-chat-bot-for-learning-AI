<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Learning Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-dark: #0f0f1e;
            --bg-light: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0c9;
            --accent: #667eea;
            --accent-light: #f093fb;
            --success: #00d4aa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1f1f3d 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .sidebar {
            width: 320px;
            background: linear-gradient(180deg, var(--bg-light) 0%, rgba(26,26,46,0.8) 100%);
            border-right: 1px solid rgba(102, 126, 234, 0.1);
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--primary-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .logo-text h2 {
            font-size: 16px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .btn {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent);
            border: 1.5px solid rgba(102, 126, 234, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: var(--accent);
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-section h3 {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 8px;
        }

        .quick-prompt {
            padding: 12px;
            background: rgba(102, 126, 234, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .quick-prompt:hover {
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent);
            border-color: var(--accent);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
        }

        .header {
            padding: 20px 32px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 26, 46, 0.4);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-badge {
            padding: 6px 12px;
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--success);
            border-radius: 20px;
            font-size: 12px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message-group {
            display: flex;
            gap: 12px;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-group.user {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
        }

        .message-avatar.ai {
            background: var(--primary-gradient);
        }

        .message-avatar.user {
            background: var(--secondary-gradient);
        }

        .message-content {
            max-width: 60%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message-group.assistant .message-content {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(240, 147, 251, 0.05) 100%);
            border: 1px solid rgba(102, 126, 234, 0.2);
            color: var(--text-primary);
        }

        .message-group.user .message-content {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }

        .step-indicator {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.1);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .spinner {
            width: 12px;
            height: 12px;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .sources {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(0, 212, 170, 0.05);
            border: 1px solid rgba(0, 212, 170, 0.2);
            border-radius: 12px;
        }

        .sources-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .source-item {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 4px 0;
            margin-left: 12px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .suggestion-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .suggestion-card {
            padding: 12px;
            background: rgba(102, 126, 234, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
        }

        .suggestion-card:hover {
            background: rgba(102, 126, 234, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .input-container {
            padding: 24px 32px;
            border-top: 1px solid rgba(102, 126, 234, 0.1);
            background: rgba(26, 26, 46, 0.4);
            backdrop-filter: blur(10px);
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(102, 126, 234, 0.05);
            border: 1.5px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 4px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            background: rgba(102, 126, 234, 0.1);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-secondary);
        }

        .btn-send {
            padding: 12px 20px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            height: 44px;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="logo-section">
                <div class="logo">🤖</div>
                <div class="logo-text">
                    <h2>AI Tutor</h2>
                    <p>Learning Assistant</p>
                </div>
            </div>

            <div class="sidebar-section">
                <button class="btn btn-primary" onclick="clearChat()">
                    <i class="fas fa-plus"></i> Cuộc trò chuyện mới
                </button>
            </div>

            <div class="sidebar-section">
                <h3>💡 Gợi ý</h3>
                <div class="quick-prompt" onclick="insertPrompt('Giải thích khái niệm về Machine Learning')">
                    Về Machine Learning
                </div>
                <div class="quick-prompt" onclick="insertPrompt('Cho tôi ví dụ về các thuật toán học máy')">
                    Các thuật toán ML
                </div>
                <div class="quick-prompt" onclick="insertPrompt('Cách bắt đầu với Deep Learning')">
                    Bắt đầu Deep Learning
                </div>
            </div>

            <div class="sidebar-section">
                <h3>⚙️ Cài đặt</h3>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px; border-radius: 6px; transition: all 0.2s ease;" onmouseover="this.style.background='rgba(102,126,234,0.1)'" onmouseout="this.style.background='transparent'">
                    <input type="checkbox" id="ocrToggle" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent);">
                    <span style="font-size: 13px;">OCR fallback</span>
                </label>
                <button class="btn btn-secondary" onclick="saveOCRSetting()">
                    <i class="fas fa-save"></i> Lưu
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>🎓 AI Learning Assistant</h1>
                <div class="status-badge">●  Active</div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="empty-state">
                    <div class="empty-icon">🚀</div>
                    <h2>Chào mừng bạn!</h2>
                    <p>Tôi là trợ lý học tập AI của bạn.<br>Hãy đặt câu hỏi để bắt đầu</p>
                    <div class="suggestion-cards">
                        <div class="suggestion-card" onclick="insertPrompt('Giải thích về Neural Networks')">
                            Neural Networks
                        </div>
                        <div class="suggestion-card" onclick="insertPrompt('So sánh các thuật toán phân loại')">
                            Phân loại
                        </div>
                        <div class="suggestion-card" onclick="insertPrompt('Tóm tắt về Computer Vision')">
                            Vision
                        </div>
                        <div class="suggestion-card" onclick="insertPrompt('Hướng dẫn về NLP')">
                            NLP
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-group">
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="messageInput" 
                            placeholder="Đặt câu hỏi của bạn..."
                            onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"
                        >
                    </div>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let isFirstMessage = true;

        function clearEmptyState() {
            if (isFirstMessage) {
                chatContainer.innerHTML = '';
                isFirstMessage = false;
            }
        }

        function addMessage(text, isUser = false) {
            clearEmptyState();
            const messageGroup = document.createElement('div');
            messageGroup.className = `message-group ${isUser ? 'user' : 'assistant'}`;
            
            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${isUser ? 'user' : 'ai'}`;
            avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-brain"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            if (!isUser) {
                messageGroup.appendChild(avatar);
                messageGroup.appendChild(contentDiv);
            } else {
                messageGroup.appendChild(contentDiv);
                messageGroup.appendChild(avatar);
            }
            
            chatContainer.appendChild(messageGroup);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return contentDiv;
        }

        function addStep(text) {
            clearEmptyState();
            const messageGroup = document.createElement('div');
            messageGroup.className = 'message-group assistant';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar ai';
            avatar.innerHTML = '<i class="fas fa-brain"></i>';
            
            const stepDiv = document.createElement('div');
            stepDiv.className = 'step-indicator';
            stepDiv.innerHTML = `<div class="spinner"></div><span>${text}</span>`;
            
            messageGroup.appendChild(avatar);
            messageGroup.appendChild(stepDiv);
            chatContainer.appendChild(messageGroup);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageGroup;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let currentMessage = null;
                let stepElements = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.startsWith('data: '));

                    for (const line of lines) {
                        const data = JSON.parse(line.slice(6));

                        if (data.type === 'step') {
                            const stepEl = addStep(data.text);
                            stepElements.push(stepEl);
                        } else if (data.type === 'token') {
                            if (!currentMessage) {
                                stepElements.forEach(el => el.remove());
                                stepElements = [];
                                currentMessage = addMessage('', false);
                            }
                            currentMessage.textContent += data.text;
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        } else if (data.type === 'sources') {
                            const sourcesDiv = document.createElement('div');
                            sourcesDiv.className = 'sources';
                            sourcesDiv.innerHTML = '<div class="sources-title"><i class="fas fa-link"></i> Nguồn tham khảo</div>';
                            
                            const sourceLines = data.text.trim().split('\n').filter(l => l.trim().startsWith('-'));
                            sourceLines.forEach(line => {
                                const item = document.createElement('div');
                                item.className = 'source-item';
                                item.innerHTML = `<i class="fas fa-file"></i> ${line.trim()}`;
                                sourcesDiv.appendChild(item);
                            });
                            
                            currentMessage.parentElement.appendChild(sourcesDiv);
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        } else if (data.type === 'error') {
                            const messageGroup = document.createElement('div');
                            messageGroup.className = 'message-group assistant';
                            const avatar = document.createElement('div');
                            avatar.className = 'message-avatar ai';
                            avatar.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                            const errorDiv = document.createElement('div');
                            errorDiv.className = 'message-content';
                            errorDiv.style.background = 'rgba(255, 107, 107, 0.1)';
                            errorDiv.style.borderColor = 'rgba(255, 107, 107, 0.3)';
                            errorDiv.textContent = `❌ ${data.text}`;
                            messageGroup.appendChild(avatar);
                            messageGroup.appendChild(errorDiv);
                            chatContainer.appendChild(messageGroup);
                        } else if (data.type === 'done') {
                            stepElements.forEach(el => el.remove());
                        }
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                const messageGroup = document.createElement('div');
                messageGroup.className = 'message-group assistant';
                const avatar = document.createElement('div');
                avatar.className = 'message-avatar ai';
                avatar.innerHTML = '<i class="fas fa-exclamation-circle"></i>';
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message-content';
                errorDiv.style.background = 'rgba(255, 107, 107, 0.1)';
                errorDiv.textContent = `❌ Lỗi: ${error.message}`;
                messageGroup.appendChild(avatar);
                messageGroup.appendChild(errorDiv);
                chatContainer.appendChild(messageGroup);
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function clearChat() {
            chatContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🚀</div>
                    <h2>Cuộc trò chuyện mới</h2>
                    <p>Bắt đầu với một câu hỏi</p>
                </div>
            `;
            isFirstMessage = true;
            messageInput.focus();
        }

        function insertPrompt(text) {
            messageInput.value = text;
            messageInput.focus();
            sendMessage();
        }

        function saveOCRSetting() {
            alert('Cài đặt OCR đã được lưu');
        }

        messageInput.focus();
    </script>
</body>
</html>
